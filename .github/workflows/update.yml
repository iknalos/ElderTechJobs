name: Daily job refresh

on:
  schedule:
    - cron: "0 11 * * *"   # every day at 11:00 UTC (~7 AM Eastern)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Scrape job boards
        run: python scraper.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "iknalos"
          git config user.email "iknalos@users.noreply.github.com"
          git add docs/jobs.json
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily job refresh $(date -u +%F)"
            git push
          fi
